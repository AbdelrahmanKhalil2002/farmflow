<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #3A7D44;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #fff;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
    }
    .logo { font-size: 72px; margin-bottom: 20px; animation: pop 0.4s ease-out; }
    .name { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
    .tagline { font-size: 13px; opacity: 0.75; margin-top: 8px; font-weight: 500; }
    .track {
      margin-top: 36px;
      width: 56px; height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: rgba(255,255,255,0.9);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes pop {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes slide {
      0%   { width: 0%;  margin-left: 0;    }
      50%  { width: 55%; margin-left: 20%;  }
      100% { width: 0%;  margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">🌾</div>
  <div class="name">FarmFlow</div>
  <div class="tagline">سوق المواشي المصري</div>
  <div class="track"><div class="bar"></div></div>
</body>
</html>
