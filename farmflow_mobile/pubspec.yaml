name: farmflow_mobile
description: "FarmFlow — Egyptian Livestock Marketplace (Mobile)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Lightweight key-value cache
  shared_preferences: ^2.3.3

  # Image caching
  cached_network_image: ^3.4.1

  # Image picker (camera + gallery)
  image_picker: ^1.1.2

  # Date/number formatting + i18n
  intl: ^0.20.2

  # Lottie animations
  lottie: ^3.1.3

  # Charts (finance screens)
  fl_chart: ^0.69.0

  # WhatsApp / phone call
  url_launcher: ^6.3.1

  # File paths
  path_provider: ^2.1.4

  # Runtime permissions
  permission_handler: ^11.3.1

  # Shimmer loading placeholder
  shimmer: ^3.0.0

  # Image compression before upload
  flutter_image_compress: ^2.3.0

  # Runtime .env config
  flutter_dotenv: ^5.2.1

  # Share files (CSV export)
  share_plus: ^10.1.4

  # Offline connectivity detection
  connectivity_plus: ^6.1.4

  # GPS location (governorate auto-detect)
  geolocator: ^12.0.0

  # PDF generation + printing
  pdf: ^3.11.1
  printing: ^5.13.2

  # Firebase (FCM push notifications)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # Local notifications (foreground overlay)
  flutter_local_notifications: ^18.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # App icon generator (run: flutter pub run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.1

  # Splash screen generator (run: flutter pub run flutter_native_splash:create)
  flutter_native_splash: ^2.4.3

  # Integration tests
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - .env

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800

# ── App icon config (flutter pub run flutter_launcher_icons) ─────────────────
# Place a 1024×1024 PNG at assets/icon/icon.png before running.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3A7D44"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: false

# ── Splash screen config (flutter pub run flutter_native_splash:create) ───────
# Place a logo PNG at assets/images/splash_logo.png before running.
flutter_native_splash:
  color: "#3A7D44"
  color_dark: "#2D6235"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
