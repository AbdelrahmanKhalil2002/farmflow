          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Supply detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Supply' }

    put:
      tags: [Supplies]
      summary: Update supply (seller owns it or admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:              { type: string }
                category:          { type: string, enum: [feed, veterinary, equipment, seeds, other] }
                description:       { type: string }
                quantity:          { type: number }
                unit:              { type: string }
                pricePerUnit:      { type: number }
                minOrderQty:       { type: number }
                location:          { type: string }
                deliveryAvailable: { type: boolean }
                deliveryCost:      { type: number }
                keepImages:        { type: string, description: JSON array of existing paths to keep }
                images:            { type: array, items: { type: string, format: binary } }
      responses:
        '200':
          description: Updated supply
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Supply' }

