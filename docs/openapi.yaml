          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '204': { description: Deleted }

  /admin/analytics:
    get:
      tags: [Admin]
      summary: Revenue by governorate — top 12 (admin only)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Revenue breakdown by governorate
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    governorate: { type: string }
                    revenue:     { type: number }
                    orderCount:  { type: integer }

  # ── BUDGET ────────────────────────────────────────────────────────────────────

  /budget:
    get:
      tags: [Budget]
      summary: Get budget entries for a year (seller only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: year
          schema: { type: integer, example: 2025 }
      responses:
        '200':
          description: Array of budget entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Budget' }

    put:
      tags: [Budget]
      summary: Upsert budget target (seller only)
      description: Creates or updates a budget entry for a specific year/month/category combination.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year, month, category, amount]
              properties:
                year:     { type: integer }
                month:    { type: integer, minimum: 1, maximum: 12 }
                category: { type: string }
                amount:   { type: number, minimum: 0 }
      responses:
        '200':
          description: Upserted budget entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Budget' }
