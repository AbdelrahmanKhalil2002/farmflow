  /supplies/{id}/status:
    patch:
      tags: [Supplies]
      summary: Approve, reject or mark sold-out (admin only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:          { type: string, enum: [approved, rejected, sold_out] }
                rejectionReason: { type: string }
      responses:
        '200':
          description: Updated supply
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Supply' }

  # ── REVIEWS ──────────────────────────────────────────────────────────────────

  /reviews:
    post:
      tags: [Reviews]
      summary: Submit review for a completed order (buyer only, one per order)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, rating]
              properties:
                orderId: { $ref: '#/components/schemas/MongoId' }
                rating:  { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        '201':
          description: Review created; seller averageRating recalculated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '409':
          description: Order already reviewed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reviews/admin/all:
    get:
      tags: [Reviews]
      summary: Get all reviews (admin only)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Array of all reviews
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Review' }

  /reviews/seller/{sellerId}:
    get:
      tags: [Reviews]
      summary: Get reviews for a seller (public)
      parameters:
        - in: path
          name: sellerId
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Array of reviews
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Review' }

  /reviews/{id}:
    delete:
      tags: [Reviews]
      summary: Delete review (admin only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '204': { description: Deleted; seller averageRating recalculated }

  # ── NOTIFICATIONS ─────────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications for current user (latest 50)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Array of notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Notification' }

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a single notification as read
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notification' }

  # ── FAVORITES ────────────────────────────────────────────────────────────────

  /favorites:
    get:
      tags: [Favorites]
      summary: Get buyer's saved farms (buyer only)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Array of seller profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  /favorites/{sellerId}:
    post:
      tags: [Favorites]
      summary: Save farm to favorites (buyer only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: sellerId
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

    delete:
      tags: [Favorites]
      summary: Remove farm from favorites (buyer only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: sellerId
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Removed from favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  # ── MARKET PRICES ─────────────────────────────────────────────────────────────

  /market-prices:
    get:
      tags: [Market Prices]
      summary: Get avg/min/max price per kg grouped by animal type (public)
      parameters:
        - in: query
          name: governorate
          schema: { type: string }
          description: Optional — narrow to a single Egyptian governorate
      responses:
        '200':
          description: Array of price stats by animal type
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    type:     { type: string }
                    avgPrice: { type: number }
                    minPrice: { type: number }
                    maxPrice: { type: number }
                    count:    { type: integer }

