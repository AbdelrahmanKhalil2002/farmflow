  # ── ANIMALS ──────────────────────────────────────────────────────────────────

  /animals:
    get:
      tags: [Animals]
      summary: Get animals (seller sees own; admin sees all)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: type
          schema: { type: string }
          description: Filter by animal type
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
          description: Page number for server-side pagination (requires `limit`). When omitted, returns full array (backwards-compatible).
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Items per page. When `page` is also provided, enables paginated response format.
      responses:
        '200':
          description: Array of animals (plain array when no `page` param; paginated object when `page` is present)
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: '#/components/schemas/Animal' }
                  - type: object
                    properties:
                      items:   { type: array, items: { $ref: '#/components/schemas/Animal' } }
                      total:   { type: integer }
                      page:    { type: integer }
                      pages:   { type: integer }
                      hasMore: { type: boolean }

    post:
      tags: [Animals]
      summary: Add animal to herd (seller or admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type]
              properties:
                type:          { type: string, enum: [cattle, buffalo, sheep, goat, camel, horse, poultry, rabbit, other] }
                breed:         { type: string }
                tagId:         { type: string, description: Unique tag/ear number per seller }
                gender:        { type: string, enum: [male, female, unknown] }
                dob:           { type: string, format: date }
                color:         { type: string }
                currentWeight: { type: number }
                healthStatus:  { type: string, enum: [healthy, sick, quarantine, deceased] }
                notes:         { type: string }
                images:        { type: array, items: { type: string, format: binary } }
      responses:
        '201':
          description: Animal created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '409':
          description: Tag ID already used for another animal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

