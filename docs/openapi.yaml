          content:
            application/json:
              schema: { $ref: '#/components/schemas/EidConfig' }

    patch:
      tags: [Eid]
      summary: Update Eid mode and date (admin only)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EidConfig' }
      responses:
        '200':
          description: Updated config
