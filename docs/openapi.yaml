          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinanceSummary' }

  # ── STATEMENTS ───────────────────────────────────────────────────────────────

  /statements:
    get:
      tags: [Statements]
      summary: Monthly P&L statement table
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: year
          required: true
          schema: { type: integer, example: 2025 }
        - in: query
          name: quarter
          schema: { type: integer, enum: [1, 2, 3, 4] }
          description: Filter to a specific quarter (client-side; all months returned if omitted)
        - in: query
          name: sellerId
          schema: { $ref: '#/components/schemas/MongoId' }
          description: Admin only
      responses:
        '200':
          description: P&L rows by category per month
          content:
            application/json:
              schema:
                type: object
                description: Category-keyed rows with per-month amounts

  /statements/transactions:
    get:
      tags: [Statements]
      summary: Drill-down — individual transactions for a given month and category
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: year
          required: true
          schema: { type: integer }
        - in: query
          name: month
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: sellerId
          schema: { $ref: '#/components/schemas/MongoId' }
          description: Admin only
      responses:
        '200':
          description: Individual expense/income records for that period
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:   { type: string, format: date-time }
                    label:  { type: string }
                    amount: { type: number }
                    type:   { type: string, enum: [income, expense] }

  # ── DAIRY ────────────────────────────────────────────────────────────────────

  /dairy:
    get:
      tags: [Dairy]
      summary: Get approved dairy products (public; seller JWT → own products)
      responses:
        '200':
          description: Array of dairy products
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DairyProduct' }

    post:
      tags: [Dairy]
      summary: Create dairy product (seller only)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, type, quantity, unit, pricePerUnit]
              properties:
                name:              { type: string }
                type:              { type: string, enum: [milk, cheese, yogurt, butter, cream, ghee, other] }
                quantity:          { type: number }
                unit:              { type: string, enum: [kg, liter, piece, pack, dozen] }
                pricePerUnit:      { type: number }
                availableFrom:     { type: string, format: date }
                availableTo:       { type: string, format: date }
                deliveryAvailable: { type: boolean }
                deliveryCost:      { type: number }
                description:       { type: string }
                minStockAlert:     { type: number }
                images:            { type: array, items: { type: string, format: binary } }
      responses:
        '201':
          description: Dairy product created (status = pending)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DairyProduct' }

  /dairy/my:
    get:
      tags: [Dairy]
      summary: Get seller's own dairy products (all statuses)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Array of dairy products
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DairyProduct' }

  /dairy/admin/all:
    get:
      tags: [Dairy]
      summary: Get all dairy products regardless of status (admin only)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Array of all dairy products (with seller populated)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DairyProduct' }

  /dairy/{id}:
    get:
      tags: [Dairy]
      summary: Get dairy product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: Dairy product detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DairyProduct' }

    put:
      tags: [Dairy]
      summary: Update dairy product (seller owns it or admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:              { type: string }
                type:              { type: string, enum: [milk, cheese, yogurt, butter, cream, ghee, other] }
                quantity:          { type: number }
                unit:              { type: string, enum: [kg, liter, piece, pack, dozen] }
                pricePerUnit:      { type: number }
                availableFrom:     { type: string, format: date }
                availableTo:       { type: string, format: date }
                deliveryAvailable: { type: boolean }
                deliveryCost:      { type: number }
                description:       { type: string }
                minStockAlert:     { type: number }
                keepImages:        { type: string, description: JSON array of existing paths to keep }
                images:            { type: array, items: { type: string, format: binary } }
      responses:
        '200':
          description: Updated dairy product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DairyProduct' }

    delete:
      tags: [Dairy]
      summary: Delete dairy product
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '204': { description: Deleted }

  /dairy/{id}/approve:
    post:
      tags: [Dairy]
      summary: Admin approve or reject dairy product
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:          { type: string, enum: [approved, rejected] }
                rejectionReason: { type: string }
      responses:
        '200':
          description: Updated dairy product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DairyProduct' }

  /dairy/{id}/stock:
    post:
      tags: [Dairy]
      summary: Update dairy product stock quantity (seller only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [change]
              properties:
                change: { type: number, description: Positive to add stock, negative to subtract }
                note:   { type: string }
      responses:
        '200':
          description: Updated dairy product with new quantity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DairyProduct' }
        '400':
          description: Stock cannot go below zero
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

