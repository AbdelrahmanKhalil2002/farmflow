# /etc/nginx/sites-available/farmflow
# Symlink to /etc/nginx/sites-enabled/farmflow to activate.
# Replace YOUR_DOMAIN_OR_IP with your actual domain or droplet IP.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP → HTTPS once you have a cert (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    # ── Frontend static files ─────────────────────────────────────────────────
    root /var/www/farmflow/frontend/dist;
    index index.html;

    # Increase max upload size to match multer config
    client_max_body_size 20M;

    # ── Uploaded images (served directly by Nginx, faster than Node) ─────────
    location /uploads/ {
        alias /var/www/farmflow/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ── API + docs proxy → Node.js backend ───────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── index.html — never cached so chunk hashes always match ──────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── JS/CSS chunks — cached forever (Vite adds content hash to filenames) ───
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA — all other routes serve index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

